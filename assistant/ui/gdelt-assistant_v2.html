<!DOCTYPE html>
<html lang="fr" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Assistant GDELT Bénin</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:          #0a0a0a;
    --bg-chat:     #0e0e0e;
    --surface:     #141414;
    --surface-2:   #1a1a1a;
    --surface-3:   #222;
    --border:      rgba(255,255,255,0.07);
    --border-hover:rgba(255,255,255,0.14);
    --text:        #e8e8e8;
    --text-muted:  #999;
    --text-faint:  #555;
    --accent:      #3b82f6;
    --accent-dim:  rgba(59,130,246,0.12);
    --accent-glow: rgba(59,130,246,0.25);
    --success:     #22c55e;
    --warning:     #f59e0b;
    --error:       #ef4444;
    --kpi-bg:      linear-gradient(135deg, rgba(59,130,246,0.08), rgba(139,92,246,0.08));
    --sidebar-w:   280px;
    --input-h:     80px;
    --radius-sm:   6px;
    --radius-md:   10px;
    --radius-lg:   14px;
    --radius-xl:   20px;
    --radius-full: 9999px;
    --font:        "Inter", -apple-system, sans-serif;
    --ease:        cubic-bezier(0.16, 1, 0.3, 1);
    --ease-out:    cubic-bezier(0.33, 1, 0.68, 1);
  }

  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--font); font-size: 14px; line-height: 1.5; -webkit-font-smoothing: antialiased; overflow: hidden; }

  /* ═══════ LAYOUT ═══════ */
  .app-layout { display: flex; height: 100vh; width: 100vw; }

  /* ═══════ SIDEBAR ═══════ */
  .sidebar {
    width: var(--sidebar-w);
    min-width: var(--sidebar-w);
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    transition: margin-left 300ms var(--ease), opacity 300ms var(--ease);
    z-index: 100;
  }
  .sidebar.collapsed { margin-left: calc(-1 * var(--sidebar-w)); opacity: 0; pointer-events: none; }

  .sidebar-header {
    padding: 1rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid var(--border);
  }
  .sidebar-brand {
    font-size: 0.8rem;
    font-weight: 600;
    color: var(--text);
    letter-spacing: -0.01em;
    display: flex; align-items: center; gap: 8px;
  }
  .sidebar-brand .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent); animation: glow 2s ease-in-out infinite alternate; }
  @keyframes glow { from { box-shadow: 0 0 4px var(--accent-glow); } to { box-shadow: 0 0 12px var(--accent-glow); } }

  .new-chat-btn {
    display: flex; align-items: center; gap: 6px;
    padding: 8px 14px;
    background: var(--surface-2);
    border: 1px solid var(--border);
    border-radius: var(--radius-md);
    color: var(--text-muted);
    font-size: 0.78rem;
    font-family: var(--font);
    cursor: pointer;
    transition: all 180ms var(--ease);
    margin: 0.75rem 1rem;
  }
  .new-chat-btn:hover { background: var(--surface-3); color: var(--text); border-color: var(--border-hover); }
  .new-chat-btn svg { width: 14px; height: 14px; }

  .sidebar-conversations { flex: 1; overflow-y: auto; padding: 0 0.5rem 1rem; }
  .sidebar-conversations::-webkit-scrollbar { width: 3px; }
  .sidebar-conversations::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  .conv-group-label { font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-faint); padding: 0.75rem 0.5rem 0.35rem; font-weight: 600; }

  .conv-item {
    padding: 0.55rem 0.65rem;
    border-radius: var(--radius-sm);
    cursor: pointer;
    font-size: 0.8rem;
    color: var(--text-muted);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    transition: all 140ms var(--ease);
  }
  .conv-item:hover { background: var(--surface-2); color: var(--text); }
  .conv-item.active { background: var(--accent-dim); color: var(--accent); }

  /* ═══════ MAIN ═══════ */
  .main-area { flex: 1; display: flex; flex-direction: column; min-width: 0; position: relative; }

  .topbar {
    height: 50px;
    display: flex;
    align-items: center;
    padding: 0 1rem;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    gap: 12px;
    flex-shrink: 0;
  }
  .toggle-sidebar-btn {
    width: 34px; height: 34px;
    display: flex; align-items: center; justify-content: center;
    background: none; border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    color: var(--text-muted); cursor: pointer;
    transition: all 160ms var(--ease);
  }
  .toggle-sidebar-btn:hover { background: var(--surface-2); color: var(--text); }
  .toggle-sidebar-btn svg { width: 16px; height: 16px; }
  .topbar-title { font-size: 0.85rem; font-weight: 500; color: var(--text); }

  /* ═══════ CHAT AREA ═══════ */
  .chat-area {
    flex: 1;
    overflow-y: auto;
    overflow-x: hidden;
    padding: 0;
    scroll-behavior: smooth;
  }
  .chat-area::-webkit-scrollbar { width: 5px; }
  .chat-area::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 4px; }

  .chat-empty {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    gap: 1.5rem;
    padding: 2rem;
  }
  .chat-empty-icon { font-size: 3rem; opacity: 0.15; }
  .chat-empty-title { font-size: 1.5rem; font-weight: 300; color: var(--text); letter-spacing: -0.02em; }
  .chat-empty-title span { font-weight: 600; }
  .chat-empty-sub { font-size: 0.85rem; color: var(--text-faint); text-align: center; max-width: 400px; }

  .suggestions-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 8px;
    max-width: 620px;
    width: 100%;
    margin-top: 0.5rem;
  }
  .suggestion-chip {
    padding: 10px 14px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-md);
    color: var(--text-muted);
    font-size: 0.78rem;
    font-family: var(--font);
    cursor: pointer;
    text-align: left;
    transition: all 180ms var(--ease);
    line-height: 1.4;
  }
  .suggestion-chip:hover { background: var(--surface-2); color: var(--text); border-color: var(--border-hover); transform: translateY(-1px); }

  /* ═══════ MESSAGES ═══════ */
  .messages-container { max-width: 800px; margin: 0 auto; padding: 1.5rem 1.25rem 1rem; }

  .msg { display: flex; gap: 12px; margin-bottom: 1.5rem; animation: msgIn 400ms var(--ease) both; }
  .msg-user { justify-content: flex-end; }
  .msg-assistant { justify-content: flex-start; }

  @keyframes msgIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }

  .msg-avatar {
    width: 30px; height: 30px; border-radius: var(--radius-full);
    display: flex; align-items: center; justify-content: center;
    font-size: 0.7rem; font-weight: 600;
    flex-shrink: 0;
  }
  .msg-user .msg-avatar { background: var(--accent); color: white; order: 2; }
  .msg-assistant .msg-avatar { background: var(--surface-3); color: var(--text-muted); }

  .msg-content { max-width: 90%; min-width: 60px; }
  .msg-user .msg-content { text-align: right; }

  .msg-bubble {
    display: inline-block;
    padding: 10px 16px;
    border-radius: var(--radius-lg);
    font-size: 0.875rem;
    line-height: 1.6;
  }
  .msg-user .msg-bubble { background: var(--accent); color: white; border-bottom-right-radius: 4px; }
  .msg-assistant .msg-bubble { background: var(--surface); border: 1px solid var(--border); border-bottom-left-radius: 4px; color: var(--text); }

  /* ═══════ LOADING ANIMATION ═══════ */
  .loading-container {
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    gap: 12px;
    padding: 16px 20px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    border-bottom-left-radius: 4px;
    min-width: 280px;
    animation: msgIn 400ms var(--ease) both;
  }
  .loading-top { display: flex; align-items: center; gap: 12px; }
  .loading-spinner {
    width: 28px; height: 28px;
    border: 2.5px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.9s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .loading-text-container { display: flex; flex-direction: column; }
  .loading-status { font-size: 0.82rem; font-weight: 500; color: var(--text); }
  .loading-sub { font-size: 0.72rem; color: var(--text-faint); margin-top: 2px; }

  .loading-bar-track { width: 100%; height: 3px; background: var(--surface-3); border-radius: 4px; overflow: hidden; }
  .loading-bar-fill { height: 100%; width: 30%; background: linear-gradient(90deg, var(--accent), #8b5cf6); border-radius: 4px; animation: barMove 2s ease-in-out infinite; }
  @keyframes barMove { 0% { width: 10%; margin-left: 0; } 50% { width: 50%; margin-left: 25%; } 100% { width: 10%; margin-left: 90%; } }

  .loading-steps { display: flex; flex-direction: column; gap: 4px; width: 100%; }
  .loading-step { display: flex; align-items: center; gap: 8px; font-size: 0.72rem; color: var(--text-faint); transition: all 300ms var(--ease); }
  .loading-step.active { color: var(--accent); }
  .loading-step.done { color: var(--success); }
  .loading-step .step-icon { width: 14px; text-align: center; }

  /* ═══════ KPI CARD ═══════ */
  .kpi-card {
    background: var(--kpi-bg);
    border: 1px solid rgba(59,130,246,0.15);
    border-radius: var(--radius-lg);
    padding: 1.5rem 2rem;
    text-align: center;
    margin: 0.75rem 0;
  }
  .kpi-label { font-size: 0.75rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 6px; }
  .kpi-value { font-size: 2.75rem; font-weight: 700; color: var(--text); letter-spacing: -0.03em; background: linear-gradient(135deg, var(--accent), #8b5cf6); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  .kpi-sub { font-size: 0.78rem; color: var(--text-faint); margin-top: 6px; }

  /* ═══════ DATA TABLE ═══════ */
  .data-table-wrapper {
    width: 100%;
    overflow-x: auto;
    margin: 0.75rem 0;
    border: 1px solid var(--border);
    border-radius: var(--radius-md);
  }
  .data-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.8rem;
  }
  .data-table thead { background: var(--surface-2); position: sticky; top: 0; z-index: 2; }
  .data-table th {
    padding: 10px 14px;
    text-align: left;
    font-weight: 600;
    font-size: 0.72rem;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    color: var(--text-muted);
    border-bottom: 1px solid var(--border);
    white-space: nowrap;
  }
  .data-table td {
    padding: 9px 14px;
    border-bottom: 1px solid var(--border);
    color: var(--text);
    white-space: nowrap;
  }
  .data-table tbody tr { transition: background 120ms; }
  .data-table tbody tr:hover { background: rgba(255,255,255,0.02); }
  .data-table tbody tr:nth-child(even) { background: rgba(255,255,255,0.015); }
  .data-table tbody tr:nth-child(even):hover { background: rgba(255,255,255,0.035); }

  .table-footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 8px 0;
    font-size: 0.75rem;
    color: var(--text-faint);
  }
  .table-count { display: flex; align-items: center; gap: 6px; }
  .table-count .badge { background: var(--surface-3); padding: 2px 8px; border-radius: var(--radius-full); font-size: 0.7rem; }

  /* ═══════ ACTION BUTTONS ═══════ */
  .action-bar { display: flex; gap: 6px; margin-top: 8px; flex-wrap: wrap; }
  .action-btn {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    padding: 6px 12px;
    background: var(--surface-2);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    color: var(--text-muted);
    font-size: 0.72rem;
    font-family: var(--font);
    cursor: pointer;
    transition: all 160ms var(--ease);
  }
  .action-btn:hover { background: var(--surface-3); color: var(--text); border-color: var(--border-hover); }
  .action-btn svg { width: 13px; height: 13px; }

  .sql-preview {
    margin-top: 8px;
    padding: 12px 14px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    font-family: "SF Mono", "Fira Code", monospace;
    font-size: 0.72rem;
    color: var(--text-muted);
    line-height: 1.7;
    overflow-x: auto;
    white-space: pre-wrap;
    word-break: break-all;
    display: none;
  }
  .sql-preview.visible { display: block; animation: fadeIn 200ms var(--ease); }

  .response-title { font-weight: 600; font-size: 0.9rem; color: var(--text); margin-bottom: 4px; }
  .response-summary { font-size: 0.82rem; color: var(--text-muted); line-height: 1.6; margin-top: 8px; }

  .error-card {
    padding: 14px 18px;
    background: rgba(239,68,68,0.06);
    border: 1px solid rgba(239,68,68,0.15);
    border-radius: var(--radius-md);
    color: #fca5a5;
    font-size: 0.82rem;
    display: flex; align-items: flex-start; gap: 10px;
  }
  .error-card .error-icon { font-size: 1rem; flex-shrink: 0; }

  /* ═══════ INPUT AREA ═══════ */
  .input-area {
    padding: 0.75rem 1.25rem 1rem;
    border-top: 1px solid var(--border);
    background: var(--surface);
    flex-shrink: 0;
  }
  .input-row {
    max-width: 800px;
    margin: 0 auto;
    display: flex;
    align-items: flex-end;
    gap: 10px;
  }
  .input-box {
    flex: 1;
    background: var(--surface-2);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 10px 16px;
    transition: all 200ms var(--ease);
  }
  .input-box:focus-within { border-color: var(--accent); box-shadow: 0 0 0 2px var(--accent-dim); }

  .chat-input {
    width: 100%;
    background: transparent;
    border: none;
    outline: none;
    color: var(--text);
    font-family: var(--font);
    font-size: 0.875rem;
    resize: none;
    min-height: 24px;
    max-height: 120px;
    line-height: 1.5;
  }
  .chat-input::placeholder { color: var(--text-faint); }

  .send-btn {
    width: 40px; height: 40px;
    border-radius: var(--radius-full);
    background: var(--accent);
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    color: white;
    transition: all 180ms var(--ease);
    flex-shrink: 0;
  }
  .send-btn:hover { background: #2563eb; transform: scale(1.04); }
  .send-btn:active { transform: scale(0.95); }
  .send-btn:disabled { opacity: 0.3; cursor: not-allowed; transform: none; }
  .send-btn svg { width: 16px; height: 16px; }

  /* ═══════ ANIMATIONS ═══════ */
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  @keyframes slideDown { from { opacity: 0; transform: translateY(-8px); } to { opacity: 1; transform: translateY(0); } }

  /* ═══════ TOOLTIP ═══════ */
  .toast {
    position: fixed;
    bottom: 100px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--surface-3);
    border: 1px solid var(--border);
    padding: 8px 18px;
    border-radius: var(--radius-full);
    font-size: 0.78rem;
    color: var(--success);
    opacity: 0;
    pointer-events: none;
    transition: all 300ms var(--ease);
    z-index: 999;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* ═══════ RESPONSIVE ═══════ */
  @media (max-width: 768px) {
    .sidebar { position: fixed; left: 0; top: 0; height: 100vh; z-index: 200; box-shadow: 8px 0 30px rgba(0,0,0,0.5); }
    .sidebar.collapsed { margin-left: calc(-1 * var(--sidebar-w)); }
    .suggestions-grid { grid-template-columns: 1fr; }
    .msg-content { max-width: 92%; }
  }
</style>
</head>
<body>

<div class="app-layout">

  <!-- ═══════ SIDEBAR ═══════ -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-brand"><div class="dot"></div> GDELT Bénin</div>
    </div>
    <button class="new-chat-btn" id="newChatBtn" onclick="newConversation()">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M8 3v10M3 8h10"/></svg>
      Nouvelle conversation
    </button>
    <div class="sidebar-conversations" id="convList">
      <div class="conv-group-label">Aujourd'hui</div>
    </div>
  </aside>

  <!-- ═══════ MAIN ═══════ -->
  <div class="main-area">

    <div class="topbar">
      <button class="toggle-sidebar-btn" onclick="toggleSidebar()">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M2 4h12M2 8h12M2 12h12"/></svg>
      </button>
      <div class="topbar-title" id="topbarTitle">Nouvelle conversation</div>
    </div>

    <div class="chat-area" id="chatArea">
      <div class="chat-empty" id="chatEmpty">
        <div class="chat-empty-icon">🌍</div>
        <div class="chat-empty-title">Assistant <span>GDELT Bénin</span></div>
        <div class="chat-empty-sub">Journalistes, décideurs publics, chercheurs : trouvez instantanément l'information géopolitique que vous recherchez sur le Bénin en 2025.</div>
        <div class="suggestions-grid" id="suggestionsGrid"></div>
      </div>
      <div class="messages-container" id="messagesContainer" style="display:none;"></div>
    </div>

    <div class="input-area">
      <div class="input-row">
        <div class="input-box">
          <textarea class="chat-input" id="chatInput" placeholder="Posez votre question…" rows="1"></textarea>
        </div>
        <button class="send-btn" id="sendBtn" disabled>
          <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M8 13V3M3 8l5-5 5 5"/></svg>
        </button>
      </div>
    </div>

  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ═══════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════
let conversations = [];
let currentConvId = null;
let isProcessing = false;

const SUGGESTIONS = [
  "Montre l'évolution mensuelle du nombre d'événements au Bénin en 2025.",
  "Combien d'événements ont été enregistrés au Bénin en 2025 ?",
  "Quels sont les types d'événements les plus fréquents au Bénin en 2025 ?",
  "Quels sont les thèmes médiatiques les plus fréquents au Bénin en 2025 ?",
  "Quelles sont les personnes les plus citées dans les articles sur le Bénin en 2025 ?",
  "Quels médias parlent le plus des événements au Bénin en 2025 ?",
];

const LOADING_MESSAGES = [
  { status: "Analyse de votre question…", sub: "Compréhension du contexte" },
  { status: "Génération de la requête SQL…", sub: "Construction optimisée" },
  { status: "Interrogation de BigQuery…", sub: "Exécution sur les données" },
  { status: "Mise en forme des résultats…", sub: "Presque terminé" },
];

const LOADING_STEPS = [
  "Compréhension de la question",
  "Sélection des tables pertinentes",
  "Génération du SQL",
  "Exécution sur BigQuery",
  "Formatage de la réponse",
];

// ═══════════════════════════════════════════
// DOM
// ═══════════════════════════════════════════
const $ = id => document.getElementById(id);
const sidebar = $('sidebar');
const chatArea = $('chatArea');
const chatEmpty = $('chatEmpty');
const msgContainer = $('messagesContainer');
const input = $('chatInput');
const sendBtn = $('sendBtn');
const convList = $('convList');
const suggestionsGrid = $('suggestionsGrid');
const topbarTitle = $('topbarTitle');

// ═══════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════
SUGGESTIONS.forEach(q => {
  const chip = document.createElement('button');
  chip.className = 'suggestion-chip';
  chip.textContent = q;
  chip.onclick = () => submitQuestion(q);
  suggestionsGrid.appendChild(chip);
});

input.addEventListener('input', () => {
  input.style.height = 'auto';
  input.style.height = Math.min(input.scrollHeight, 120) + 'px';
  sendBtn.disabled = input.value.trim() === '' || isProcessing;
});

input.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    if (!sendBtn.disabled) submitQuestion(input.value.trim());
  }
});

sendBtn.addEventListener('click', () => {
  if (!sendBtn.disabled) submitQuestion(input.value.trim());
});

// ═══════════════════════════════════════════
// SIDEBAR
// ═══════════════════════════════════════════
function toggleSidebar() { sidebar.classList.toggle('collapsed'); }

function newConversation() {
  currentConvId = Date.now().toString();
  conversations.push({ id: currentConvId, title: 'Nouvelle conversation', messages: [] });
  renderConvList();
  msgContainer.innerHTML = '';
  msgContainer.style.display = 'none';
  chatEmpty.style.display = 'flex';
  topbarTitle.textContent = 'Nouvelle conversation';
  input.focus();
  if (window.innerWidth < 768) sidebar.classList.add('collapsed');
}

function switchConversation(id) {
  currentConvId = id;
  const conv = conversations.find(c => c.id === id);
  if (!conv) return;
  renderConvList();
  msgContainer.innerHTML = '';
  if (conv.messages.length > 0) {
    chatEmpty.style.display = 'none';
    msgContainer.style.display = 'block';
    conv.messages.forEach(m => {
      if (m.role === 'user') appendUserMsg(m.text, false);
      else appendAssistantHTML(m.html, false);
    });
    scrollChat();
  } else {
    chatEmpty.style.display = 'flex';
    msgContainer.style.display = 'none';
  }
  topbarTitle.textContent = conv.title;
  if (window.innerWidth < 768) sidebar.classList.add('collapsed');
}

function renderConvList() {
  const label = convList.querySelector('.conv-group-label');
  convList.innerHTML = '';
  convList.appendChild(label);
  conversations.slice().reverse().forEach(c => {
    const el = document.createElement('div');
    el.className = 'conv-item' + (c.id === currentConvId ? ' active' : '');
    el.textContent = c.title;
    el.onclick = () => switchConversation(c.id);
    convList.appendChild(el);
  });
}

// ═══════════════════════════════════════════
// MESSAGES
// ═══════════════════════════════════════════
function appendUserMsg(text, animate = true) {
  const div = document.createElement('div');
  div.className = 'msg msg-user';
  div.style.animationDuration = animate ? '400ms' : '0ms';
  div.innerHTML = `<div class="msg-content"><div class="msg-bubble">${escapeHtml(text)}</div></div><div class="msg-avatar">V</div>`;
  msgContainer.appendChild(div);
}

function appendAssistantHTML(html, animate = true) {
  const div = document.createElement('div');
  div.className = 'msg msg-assistant';
  div.style.animationDuration = animate ? '400ms' : '0ms';
  div.innerHTML = `<div class="msg-avatar">G</div><div class="msg-content">${html}</div>`;
  msgContainer.appendChild(div);
}

function appendLoading() {
  const id = 'loading-' + Date.now();
  const stepsHTML = LOADING_STEPS.map((s, i) =>
    `<div class="loading-step${i === 0 ? ' active' : ''}" data-step="${i}"><span class="step-icon">${i === 0 ? '⟳' : '○'}</span> ${s}</div>`
  ).join('');

  const html = `<div class="msg msg-assistant" id="${id}"><div class="msg-avatar">G</div><div class="msg-content"><div class="loading-container">
    <div class="loading-top"><div class="loading-spinner"></div><div class="loading-text-container"><div class="loading-status">${LOADING_MESSAGES[0].status}</div><div class="loading-sub">${LOADING_MESSAGES[0].sub}</div></div></div>
    <div class="loading-bar-track"><div class="loading-bar-fill"></div></div>
    <div class="loading-steps">${stepsHTML}</div>
  </div></div></div>`;
  msgContainer.insertAdjacentHTML('beforeend', html);

  let step = 0;
  const interval = setInterval(() => {
    step++;
    if (step >= LOADING_MESSAGES.length) { clearInterval(interval); return; }
    const el = document.getElementById(id);
    if (!el) { clearInterval(interval); return; }
    el.querySelector('.loading-status').textContent = LOADING_MESSAGES[step].status;
    el.querySelector('.loading-sub').textContent = LOADING_MESSAGES[step].sub;
    el.querySelectorAll('.loading-step').forEach((s, i) => {
      s.className = 'loading-step' + (i < step ? ' done' : i === step ? ' active' : '');
      s.querySelector('.step-icon').textContent = i < step ? '✓' : i === step ? '⟳' : '○';
    });
  }, 2200);

  return { id, interval };
}

function removeLoading(loader) {
  clearInterval(loader.interval);
  const el = document.getElementById(loader.id);
  if (el) el.remove();
}

function scrollChat() { chatArea.scrollTop = chatArea.scrollHeight; }

// ═══════════════════════════════════════════
// RENDER RESPONSE
// ═══════════════════════════════════════════
function buildResponseHTML(r) {
  let html = '';
  const title = r.title || r.explanation_hint || '';
  const summary = r.summary || r.user_message || '';

  if (r.status !== 'success') {
    const errMsg = r.user_message || r.message || 'Une erreur est survenue.';
    const details = r.details || '';
    html = `<div class="error-card"><span class="error-icon">⚠️</span><div><strong>${escapeHtml(errMsg)}</strong>${details ? '<br><span style="font-size:0.75rem;color:var(--text-faint)">' + escapeHtml(details) + '</span>' : ''}</div></div>`;
    return html;
  }

  if (title) html += `<div class="response-title">${escapeHtml(title)}</div>`;

  // Afficher les données AVANT l'insight
  if (r.data && r.data.length > 0) {
    if (r.chart_type === 'kpi' && r.data.length === 1) {
      const row = r.data[0];
      const keys = Object.keys(row);
      const label = keys.length > 1 ? keys[0] : '';
      const valKey = keys.length > 1 ? keys[1] : keys[0];
      const val = row[valKey];
      html += `<div class="kpi-card"><div class="kpi-label">${escapeHtml(label ? String(row[keys[0]]) : valKey)}</div><div class="kpi-value">${typeof val === 'number' ? val.toLocaleString('fr-FR') : val}</div></div>`;
    } else {
      const tableId = 'tbl-' + Date.now();
      const keys = Object.keys(r.data[0]);
      let thead = '<tr>' + keys.map(k => `<th>${escapeHtml(k)}</th>`).join('') + '</tr>';
      let tbody = r.data.map(row =>
        '<tr>' + keys.map(k => {
          let v = row[k];
          if (typeof v === 'number') v = Number.isInteger(v) ? v.toLocaleString('fr-FR') : v.toFixed(2);
          return `<td>${v ?? ''}</td>`;
        }).join('') + '</tr>'
      ).join('');

      html += `<div class="data-table-wrapper"><table class="data-table" id="${tableId}"><thead>${thead}</thead><tbody>${tbody}</tbody></table></div>`;
      html += `<div class="table-footer"><div class="table-count"><span class="badge">${r.data.length}</span> résultat${r.data.length > 1 ? 's' : ''}</div></div>`;
    }
  }

  if (summary) html += `<div class="response-summary">${escapeHtml(summary)}</div>`;

  // Action buttons
  let actions = '<div class="action-bar">';
  if (r.data && r.data.length > 0) {
    actions += `<button class="action-btn" onclick='exportCSV(${JSON.stringify(r.data).replace(/'/g,"\\'")})'><svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M3 10v3h10v-3M8 2v8M5 7l3 3 3-3"/></svg>CSV</button>`;
  }
  if (r.sql) {
    const sqlId = 'sql-' + Date.now();
    actions += `<button class="action-btn" onclick="toggleSQL('${sqlId}')"><svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M4 5l4 3-4 3M9 11h4"/></svg>SQL</button>`;
    html += `<div class="sql-preview" id="${sqlId}">${formatSQL(r.sql)}</div>`;
  }
  actions += '</div>';
  html += actions;

  // Afficher l'insight APRÈS les résultats (comme une interprétation/conclusion)
  if (r.insight) {
    html += `<div class="insight-box" style="background:linear-gradient(135deg,var(--accent-dim) 0%,rgba(228,87,86,0.08) 100%);border-left:3px solid var(--accent);border-radius:var(--radius-md);padding:1.25rem;margin:1.5rem 0 0 0;color:var(--text);font-style:italic;font-size:0.95rem;line-height:1.6;">
      <strong>Insight clé:</strong> ${escapeHtml(r.insight)}
    </div>`;
  }

  return html;
}

// ═══════════════════════════════════════════
// SUBMIT
// ═══════════════════════════════════════════
function submitQuestion(text) {
  if (!text || isProcessing) return;
  isProcessing = true;
  sendBtn.disabled = true;

  if (!currentConvId) {
    currentConvId = Date.now().toString();
    conversations.push({ id: currentConvId, title: text.slice(0, 50), messages: [] });
  }

  const conv = conversations.find(c => c.id === currentConvId);
  if (conv && conv.title === 'Nouvelle conversation') conv.title = text.slice(0, 50);
  renderConvList();

  chatEmpty.style.display = 'none';
  msgContainer.style.display = 'block';

  appendUserMsg(text);
  if (conv) conv.messages.push({ role: 'user', text });

  input.value = '';
  input.style.height = 'auto';
  sendBtn.disabled = true;

  const loader = appendLoading();
  scrollChat();

  fetch('/api/question', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ question: text })
  })
  .then(r => { if (!r.ok) throw new Error('HTTP ' + r.status); return r.json(); })
  .then(response => {
    removeLoading(loader);
    const html = buildResponseHTML(response);
    appendAssistantHTML(html);
    if (conv) conv.messages.push({ role: 'assistant', html });
    scrollChat();
    topbarTitle.textContent = conv ? conv.title : 'Conversation';
  })
  .catch(err => {
    removeLoading(loader);
    const html = `<div class="error-card"><span class="error-icon">⚠️</span><div>Erreur de connexion au serveur.<br><span style="font-size:0.75rem;color:var(--text-faint)">${escapeHtml(err.message)}</span></div></div>`;
    appendAssistantHTML(html);
  })
  .finally(() => {
    isProcessing = false;
    sendBtn.disabled = input.value.trim() === '';
  });
}

// ═══════════════════════════════════════════
// UTILS
// ═══════════════════════════════════════════
function escapeHtml(s) {
  if (!s) return '';
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function formatSQL(sql) {
  return sql.replace(/\b(SELECT|FROM|JOIN|ON|WHERE|AND|OR|GROUP BY|ORDER BY|LIMIT|HAVING|AS|LEFT|RIGHT|INNER|CROSS|FULL|DISTINCT|COUNT|AVG|SUM|MIN|MAX|ROUND|CASE|WHEN|THEN|ELSE|END|IN|LIKE|BETWEEN|IS|NOT|NULL|TRUE|FALSE|UNNEST|SPLIT|WITH)\b/gi,
    '<span style="color:var(--accent)">$1</span>');
}

function toggleSQL(id) {
  const el = document.getElementById(id);
  if (el) el.classList.toggle('visible');
}

function exportCSV(data) {
  if (!data || !data.length) return;
  const keys = Object.keys(data[0]);
  const sep = ';';
  let csv = '\uFEFF' + keys.join(sep) + '\n';
  data.forEach(row => {
    csv += keys.map(k => {
      let v = row[k] ?? '';
      v = String(v).replace(/"/g, '""');
      return '"' + v + '"';
    }).join(sep) + '\n';
  });
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'gdelt_export_' + new Date().toISOString().slice(0,10) + '.csv';
  a.click();
  URL.revokeObjectURL(url);
  showToast('Fichier CSV exporté ✓');
}

function showToast(msg) {
  const t = $('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// Init first conversation
newConversation();
</script>
